[supervisord]
nodaemon=true
user=root

[program:grafana]
user=root
# cwd must be Grafana's homepath. /run.sh shells out to `grafana cli` for
# GF_INSTALL_PLUGINS, and on Grafana <= 12.0.x the cli reads its config from
# the working directory rather than --homepath; running it from
# /var/lib/grafana makes it fail with "Could not find config defaults",
# `set -e` then aborts /run.sh before `grafana server` starts. Newer versions
# (12.3+, 13.x) resolve the config differently and tolerated the wrong cwd.
directory=/usr/share/grafana
command=bash -c 'while [ ! -f /root/hydrolix-hydrolix-datasource/dist/gpx_plugin* ]; do sleep 1; done; /run.sh'
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
killasgroup=true
stopasgroup=true
autostart=true

[program:delve]
user=root
command=/bin/bash -c 'pid=""; while [ -z "$pid" ]; do pid=$(pgrep -f gpx_plugin); done; /root/go/bin/dlv attach --api-version=2 --headless --continue --accept-multiclient --listen=:2345 $pid'
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
killasgroup=false
stopasgroup=false
autostart=true
autorestart=true

[program:build-watcher]
user=root
command=/bin/bash -c 'while inotifywait -e modify,create,delete -r /var/lib/grafana/plugins/hydrolix-hydrolix-datasource; do echo "Change detected, restarting delve...";supervisorctl restart delve; done'
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
killasgroup=true
stopasgroup=true
autostart=true

[program:mage-watcher]
user=root
environment=PATH="/usr/local/go/bin:/root/go/bin:%(ENV_PATH)s"
directory=/root/hydrolix-hydrolix-datasource
command=/bin/bash -c 'git config --global --add safe.directory /root/hydrolix-hydrolix-datasource && mage -v watch'
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
killasgroup=true
stopasgroup=true
autostart=true
